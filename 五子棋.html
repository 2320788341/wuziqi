<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚫🔴 五子棋</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(160deg, #1a1a2e, #16213e, #0f3460);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    padding: 16px;
  }
  .container { text-align: center; }

  .title {
    color: #fff;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 4px;
    margin-bottom: 6px;
  }

  .status {
    font-size: 18px;
    margin-bottom: 12px;
    height: 28px;
    letter-spacing: 2px;
  }

  .board-wrap {
    display: inline-block;
    background: #c8a45c;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  canvas {
    display: block;
    touch-action: manipulation;
  }

  .btn {
    margin-top: 14px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px 36px;
    font-size: 17px;
    border-radius: 30px;
    cursor: pointer;
    letter-spacing: 3px;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn:active { transform: scale(0.95); }

  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .overlay.hidden { display: none; }

  .win-dialog {
    background: #1a2740;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 32px 36px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .win-dialog .win-icon { font-size: 56px; margin-bottom: 8px; }
  .win-dialog .win-text { color: #fff; font-size: 22px; letter-spacing: 3px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="container">
  <div class="title">⚫🔴 五 子 棋</div>
  <div class="status" id="status" style="color:#ff6b6b">🔴 红方落子</div>
  <div class="board-wrap">
    <canvas id="board"></canvas>
  </div>
  <br>
  <button class="btn" onclick="restart()">🔄 重新开始</button>
</div>

<div class="overlay hidden" id="overlay">
  <div class="win-dialog">
    <div class="win-icon" id="winIcon"></div>
    <div class="win-text" id="winText"></div>
    <button class="btn" onclick="restart()">🔄 再来一局</button>
  </div>
</div>

<script>
const SIZE = 15;   // 15x15
let grid = [];
let currentPlayer = 'red';
let gameOver = false;
let winningCells = [];
let lastMove = null;

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

// 自适应尺寸
const MAX_SIZE = Math.min(window.innerWidth - 40, window.innerHeight - 260, 440);
const CELL = Math.floor(MAX_SIZE / (SIZE + 1));
const PADDING = CELL;
const BOARD_PX = CELL * (SIZE - 1) + PADDING * 2;
canvas.width = BOARD_PX;
canvas.height = BOARD_PX;
canvas.style.width = BOARD_PX + 'px';
canvas.style.height = BOARD_PX + 'px';

function initGrid() {
  grid = Array.from({length: SIZE}, () => Array(SIZE).fill(null));
  currentPlayer = 'red';
  gameOver = false;
  winningCells = [];
  lastMove = null;
  document.getElementById('overlay').classList.add('hidden');
  updateStatus();
  draw();
}

function updateStatus() {
  const s = document.getElementById('status');
  if (gameOver) {
    s.textContent = currentPlayer === 'red' ? '🔴 红方获胜！' : '⚫ 黑方获胜！';
    s.style.color = currentPlayer === 'red' ? '#ff6b6b' : '#aaa';
  } else {
    s.textContent = currentPlayer === 'red' ? '🔴 红方落子' : '⚫ 黑方落子';
    s.style.color = currentPlayer === 'red' ? '#ff6b6b' : '#aaa';
  }
}

function placePiece(row, col) {
  if (gameOver || grid[row][col]) return;

  grid[row][col] = currentPlayer;
  lastMove = [row, col];

  if (checkWin(row, col)) {
    gameOver = true;
    updateStatus();
    draw();
    setTimeout(showWinDialog, 500);
    return;
  }

  if (checkDraw()) {
    gameOver = true;
    document.getElementById('status').textContent = '🤝 平局！';
    document.getElementById('status').style.color = '#fff';
    draw();
    setTimeout(showDrawDialog, 400);
    return;
  }

  currentPlayer = currentPlayer === 'red' ? 'black' : 'red';
  updateStatus();
  draw();
}

function checkWin(row, col) {
  const player = grid[row][col];
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];

  for (const [dr, dc] of dirs) {
    const cells = [[row, col]];
    for (let i = 1; i < 5; i++) {
      const r = row + dr*i, c = col + dc*i;
      if (r>=0 && r<SIZE && c>=0 && c<SIZE && grid[r][c]===player) cells.push([r,c]);
      else break;
    }
    for (let i = 1; i < 5; i++) {
      const r = row - dr*i, c = col - dc*i;
      if (r>=0 && r<SIZE && c>=0 && c<SIZE && grid[r][c]===player) cells.unshift([r,c]);
      else break;
    }
    if (cells.length >= 5) { winningCells = cells; return true; }
  }
  return false;
}

function checkDraw() {
  return grid.every(row => row.every(c => c !== null));
}

function draw() {
  ctx.clearRect(0, 0, BOARD_PX, BOARD_PX);

  // 棋盘背景
  ctx.fillStyle = '#c8a45c';
  ctx.fillRect(0, 0, BOARD_PX, BOARD_PX);

  // 网格线
  ctx.strokeStyle = '#5a4020';
  ctx.lineWidth = 1;
  for (let i = 0; i < SIZE; i++) {
    const pos = PADDING + i * CELL;
    ctx.beginPath();
    ctx.moveTo(PADDING, pos);
    ctx.lineTo(PADDING + (SIZE-1)*CELL, pos);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos, PADDING);
    ctx.lineTo(pos, PADDING + (SIZE-1)*CELL);
    ctx.stroke();
  }

  // 星位（天元和四角）
  const stars = [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];
  ctx.fillStyle = '#5a4020';
  for (const [r,c] of stars) {
    ctx.beginPath();
    ctx.arc(PADDING + c*CELL, PADDING + r*CELL, 3.5, 0, Math.PI*2);
    ctx.fill();
  }

  // 棋子
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (!grid[r][c]) continue;
      const x = PADDING + c * CELL;
      const y = PADDING + r * CELL;
      const radius = CELL * 0.44;

      // 阴影
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.arc(x+2, y+2, radius, 0, Math.PI*2);
      ctx.fill();

      // 棋子
      const grad = ctx.createRadialGradient(x-3, y-3, radius*0.1, x, y, radius);
      if (grid[r][c] === 'red') {
        grad.addColorStop(0, '#ff9999');
        grad.addColorStop(1, '#b5302a');
      } else {
        grad.addColorStop(0, '#888');
        grad.addColorStop(1, '#1a1a1a');
      }
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI*2);
      ctx.fill();

      // 高光
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.beginPath();
      ctx.arc(x-5, y-5, radius*0.35, 0, Math.PI*2);
      ctx.fill();

      // 胜利高亮
      if (winningCells.some(([wr,wc]) => wr===r && wc===c)) {
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(x, y, radius+3, 0, Math.PI*2);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }
  }

  // 最后一步指示器
  if (lastMove) {
    const [lr, lc] = lastMove;
    const x = PADDING + lc * CELL;
    const y = PADDING + lr * CELL;
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI*2);
    ctx.fill();
  }
}

canvas.addEventListener('click', (e) => {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const col = Math.round((mx - PADDING) / CELL);
  const row = Math.round((my - PADDING) / CELL);
  if (row >= 0 && row < SIZE && col >= 0 && col < SIZE) {
    placePiece(row, col);
  }
});

canvas.addEventListener('touchstart', (e) => {
  if (gameOver) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.touches[0].clientX - rect.left;
  const my = e.touches[0].clientY - rect.top;
  const col = Math.round((mx - PADDING) / CELL);
  const row = Math.round((my - PADDING) / CELL);
  if (row >= 0 && row < SIZE && col >= 0 && col < SIZE) {
    placePiece(row, col);
  }
});

function showWinDialog() {
  document.getElementById('winIcon').textContent = currentPlayer === 'red' ? '🔴' : '⚫';
  document.getElementById('winText').textContent = (currentPlayer==='red'?'红方':'黑方') + ' 五子连珠，获胜！';
  document.getElementById('overlay').classList.remove('hidden');
}
function showDrawDialog() {
  document.getElementById('winIcon').textContent = '🤝';
  document.getElementById('winText').textContent = '棋盘满了，平局！';
  document.getElementById('overlay').classList.remove('hidden');
}
function restart() { initGrid(); }

initGrid();
</script>
</body>
</html>
